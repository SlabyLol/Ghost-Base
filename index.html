<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghost Project | DarkFox Co.</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        
        /* Das Start-Menü */
        #menu {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #111 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 24px;
            background: transparent;
            color: #ff0000;
            border: 2px solid #ff0000;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: 0.3s;
        }

        #start-btn:hover {
            background: #ff0000;
            color: black;
            box-shadow: 0 0 20px #ff0000;
        }

        #ui { position: absolute; bottom: 20px; left: 20px; color: #444; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>
    <div id="menu">
        <h1 style="letter-spacing: 10px; margin-bottom: 50px;">GHOST VOID</h1>
        <button id="start-btn">START GAME</button>
        <p style="margin-top: 20px; font-size: 12px; color: #555;">(Nutze Maus oder Controller)</p>
    </div>

    <div id="ui">© DarkFox Co. | WASD / Stick to Move</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
